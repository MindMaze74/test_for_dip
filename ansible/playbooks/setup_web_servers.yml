---
- name: Setup web servers
  hosts: web
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Create nginx directories
      file:
        path: "/opt/nginx/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - html
        - logs
        - conf.d

    - name: Deploy website
      copy:
        dest: /opt/nginx/html/index.html
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Курсовая работа</title>
            <style>
              body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
              h1 { color: #333; }
              .server { color: #0066cc; font-weight: bold; }
            </style>
          </head>
          <body>
            <h1>Курсовая работа - Старцев Данила Антонович</h1>
            <p>Сервер: <span class="server">{{ ansible_hostname }}</span></p>
            <p>IP: <span class="server">{{ ansible_default_ipv4.address }}</span></p>
          </body>
          </html>

    - name: Create nginx config with extended logging
      copy:
        dest: /opt/nginx/conf.d/default.conf
        content: |
          server {
              listen 80 default_server;
              server_name _;
              root /usr/share/nginx/html;
              index index.html;

              # Расширенный формат логов с временем ответа
              access_log /var/log/nginx/access.log main;
              error_log /var/log/nginx/error.log warn;

              location /metrics {
                  stub_status;
                  access_log off;
                  allow 10.0.0.0/8;
                  deny all;
              }
          }

    - name: Create custom nginx main config with extended log format
      copy:
        dest: /opt/nginx/nginx.conf
        content: |
          user nginx;
          worker_processes auto;
          error_log /var/log/nginx/error.log warn;
          pid /var/run/nginx.pid;

          events {
              worker_connections 1024;
          }

          http {
              include /etc/nginx/mime.types;
              default_type application/octet-stream;

              log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                              '$status $body_bytes_sent "$http_referer" '
                              '"$http_user_agent" "$http_x_forwarded_for" '
                              'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

              access_log /var/log/nginx/access.log main;

              sendfile on;
              tcp_nopush on;
              keepalive_timeout 65;
              types_hash_max_size 2048;

              include /etc/nginx/conf.d/*.conf;
          }

    - name: Run nginx container with extended logging
      docker_container:
        name: nginx
        image: nginx:latest
        state: started
        restart_policy: always
        ports:
          - "80:80"
        volumes:
          - /opt/nginx/html:/usr/share/nginx/html:ro
          - /opt/nginx/conf.d:/etc/nginx/conf.d:ro
          - /opt/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
          - /opt/nginx/logs:/var/log/nginx

    - name: Install Node Exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
      register: download
      until: download is not failed
      retries: 3
      delay: 10

    - name: Extract Node Exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: yes
        creates: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter

    - name: Install Node Exporter
      copy:
        src: /tmp/node_exporter-1.7.0.linux-amd64/node_exporter
        dest: /usr/local/bin/node_exporter
        mode: '0755'
        remote_src: yes

    - name: Create Node Exporter service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target
          [Service]
          User=ubuntu
          ExecStart=/usr/local/bin/node_exporter
          [Install]
          WantedBy=multi-user.target

    - name: Start Node Exporter
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    - name: Install Nginx Log Exporter
      get_url:
        url: "https://github.com/martin-helmich/prometheus-nginxlog-exporter/releases/download/v1.9.2/prometheus-nginxlog-exporter_1.9.2_linux_amd64.deb"
        dest: /tmp/nginx-log-exporter.deb
      register: download
      until: download is not failed
      retries: 3
      delay: 10

    - name: Install DEB package
      apt:
        deb: /tmp/nginx-log-exporter.deb

    - name: Configure Nginx Log Exporter with extended metrics
      copy:
        dest: /etc/prometheus-nginxlog-exporter.hcl
        content: |
          listen {
            port = 4040
            address = "0.0.0.0"
          }

          namespace "nginx" {
            format = "$remote_addr - $remote_user [$time_local] \"$request\" $status $body_bytes_sent \"$http_referer\" \"$http_user_agent\" \"$http_x_forwarded_for\" rt=$request_time urt=$upstream_response_time"

            source {
              files = ["/var/log/nginx/access.log"]
            }

            #Гистограммы для времени ответа
            histogram_buckets = [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10]

            #Добавляем кастомные метки
            labels {
              service = "web"
              server_name = "{{ ansible_hostname }}"
            }

            #Релейблинг для группировки URI
            relabel "request_uri" {
              from = "request"
              split = 2
              match "^/users/[0-9]+" {
                replacement = "/users/:id"
              }
              match "^/profiles/[0-9]+" {
                replacement = "/profiles/:id"
              }
              match "^/api/v[0-9]+/.*" {
                replacement = "/api/v:version/*"
              }
            }
          }

    - name: Start Nginx Log Exporter
      systemd:
        name: prometheus-nginxlog-exporter
        state: restarted
        enabled: yes

    #Удаляем все старые репозитории Elastic
    - name: Remove all Elastic repositories
      shell: |
        rm -f /etc/apt/sources.list.d/elastic-*.list
        rm -f /etc/apt/sources.list.d/elastic-*.list.save
        find /etc/apt -name "elastic-*.list" -exec rm -f {} \;
        apt-get update
      become: yes
      register: apt_update
      ignore_errors: yes

    - name: If apt update failed, disable all Elastic repos and retry
      shell: |
        find /etc/apt -name "*.list" -exec sed -i '/artifacts.elastic.co/s/^/#/' {} \;
        apt-get update
      become: yes
      when: apt_update is failed
      ignore_errors: yes

    # Запускаем Filebeat через Docker (альтернатива systemd)
    - name: Create Filebeat config directory
      file:
        path: /opt/filebeat
        state: directory
        mode: '0755'

    - name: Configure Filebeat for Docker
      copy:
        dest: /opt/filebeat/filebeat.yml
        content: |
          filebeat.inputs:
            - type: container
              paths:
                - /var/lib/docker/containers/*/*.log
              processors:
                - add_docker_metadata: ~

            - type: log
              enabled: true
              paths:
                - /var/log/nginx/access.log
              fields:
                log_type: nginx_access

            - type: log
              enabled: true
              paths:
                - /var/log/nginx/error.log
              fields:
                log_type: nginx_error

          output.elasticsearch:
            hosts: ["{{ elasticsearch_private_ip }}:9200"]
            index: "nginx-logs-%{+yyyy.MM.dd}"
          setup.ilm.enabled: false

    - name: Run Filebeat container
      docker_container:
        name: filebeat
        image: docker.elastic.co/beats/filebeat:7.17.20
        state: started
        restart_policy: always
        volumes:
          - /opt/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
          - /var/log/nginx:/var/log/nginx:ro
          - /var/lib/docker/containers:/var/lib/docker/containers:ro
        user: root

    - name: Verify Filebeat container is running
      shell: docker ps -q -f name=filebeat
      register: filebeat_container
      changed_when: false
      failed_when: false

    - name: Show Filebeat container status
      debug:
        msg: "Filebeat container on {{ inventory_hostname }}: {{ 'running' if filebeat_container.stdout else 'not running' }}"

    - name: Verify Nginx Log Exporter is running
      shell: systemctl is-active prometheus-nginxlog-exporter
      register: exporter_status
      changed_when: false
      failed_when: false

    - name: Show Nginx Log Exporter status
      debug:
        msg: "Nginx Log Exporter on {{ inventory_hostname }}: {{ exporter_status.stdout }}"