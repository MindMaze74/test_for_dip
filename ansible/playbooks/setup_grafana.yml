---
- name: Setup Grafana
  hosts: grafana
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Create grafana directory
      file:
        path: /opt/grafana
        state: directory
        owner: "472"
        group: "472"
        mode: '0755'

    - name: Run grafana container
      docker_container:
        name: grafana
        image: grafana/grafana:latest
        state: started
        restart_policy: always
        ports:
          - "3000:3000"
        volumes:
          - /opt/grafana:/var/lib/grafana
        env:
          GF_SECURITY_ADMIN_USER: "admin"
          GF_SECURITY_ADMIN_PASSWORD: "admin"