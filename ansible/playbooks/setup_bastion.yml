---
- name: Setup Bastion host
  hosts: bastion
  become: yes
  gather_facts: yes

  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Create Nginx config for proxy
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          upstream web_backend {
              server {{ web1_private_ip }}:80;
              server {{ web2_private_ip }}:80;
          }

          server {
              listen 80 default_server;
              server_name _;
              location / {
                  proxy_pass http://web_backend;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }

          server {
              listen 3000;
              server_name _;
              location / {
                  proxy_pass http://{{ grafana_private_ip }}:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }

          server {
              listen 5601;
              server_name _;
              location / {
                  proxy_pass http://{{ kibana_private_ip }}:5601;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              }
          }
      notify: restart nginx

    - name: Ensure Nginx is running
      systemd:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
